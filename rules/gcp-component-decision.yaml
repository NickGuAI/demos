# GCP Component Decision Rules
#
# This file maps project signals (keywords, patterns, requirements) to
# GCP components. The generator reads a project spec, matches signals,
# and selects which components are needed.
#
# ┌─────────────────┐     ┌───────────────────┐     ┌──────────────────┐
# │  Project Spec   │────→│  Decision Engine  │────→│  Selected        │
# │  (markdown)     │     │  (match signals)  │     │  Components      │
# └─────────────────┘     └───────────────────┘     └──────────────────┘
#                                   │
#                                   ▼
#                         ┌───────────────────┐
#                         │  This YAML file   │
#                         │  (rules)          │
#                         └───────────────────┘
#
# How matching works:
# - Each component has a list of signal groups
# - Each signal group has keywords (case-insensitive substring match)
# - If ANY keyword in a group matches, that group is satisfied
# - If ANY group is satisfied, the component is selected
# - A component can also be force-selected via the "always" flag
#
# Human-editable: add/remove signals as your project patterns evolve.

components:
  cloud_run:
    description: "Serverless container deployment on Cloud Run"
    signals:
      - group: "web_service"
        keywords:
          - "web application"
          - "web app"
          - "REST API"
          - "HTTP"
          - "API endpoint"
          - "backend service"
          - "server"
          - "frontend"
          - "landing page"
      - group: "deployment"
        keywords:
          - "deploy"
          - "container"
          - "docker"
          - "serverless"
          - "cloud run"
      - group: "architecture"
        keywords:
          - "microservice"
          - "service mesh"
          - "load balancer"
    transitive_requires: []
    supporting_infra:
      - "artifact_registry"
      - "service_account"

  iam:
    description: "IAM roles, bindings, and service accounts"
    signals:
      - group: "access_control"
        keywords:
          - "authentication"
          - "authorization"
          - "permission"
          - "role"
          - "access control"
          - "RBAC"
      - group: "service_identity"
        keywords:
          - "service account"
          - "service-to-service"
          - "workload identity"
      - group: "security"
        keywords:
          - "IAM"
          - "policy binding"
          - "least privilege"
          - "public access"
          - "unauthenticated"
    transitive_requires: []
    supporting_infra:
      - "service_account"

  alloydb:
    description: "AlloyDB for PostgreSQL managed database"
    signals:
      - group: "database"
        keywords:
          - "database"
          - "PostgreSQL"
          - "postgres"
          - "SQL"
          - "relational"
          - "AlloyDB"
      - group: "data_operations"
        keywords:
          - "CRUD"
          - "query"
          - "transaction"
          - "migration"
          - "schema"
          - "table"
      - group: "persistence"
        keywords:
          - "persistent storage"
          - "data store"
          - "user data"
          - "records"
    transitive_requires:
      - "iam"  # AlloyDB always needs IAM for service account connectivity
    supporting_infra:
      - "vpc_network"
      - "service_account"
      - "secret_manager"

# Supporting infrastructure components (auto-included when a main component needs them)
supporting:
  artifact_registry:
    description: "Container image storage for Cloud Run"
    when: "cloud_run"

  vpc_network:
    description: "VPC networking for AlloyDB private connectivity"
    when: "alloydb"

  service_account:
    description: "Dedicated service account for least-privilege access"
    when: "any"

  secret_manager:
    description: "Secret Manager for database credentials"
    when: "alloydb"

# Template selection matrix
# Maps component combinations to prompt template files
template_matrix:
  cloud_run: "cloud-run.md"
  iam: "iam.md"
  alloydb: "alloydb.md"
  cloud_run+iam: "cloud-run-iam.md"
  alloydb+cloud_run: "cloud-run-alloydb.md"
  alloydb+cloud_run+iam: "cloud-run-iam-alloydb.md"
