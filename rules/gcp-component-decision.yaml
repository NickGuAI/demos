# GCP Component Catalog
#
# This file describes available GCP components for the decision engine.
# Claude reads this catalog + the project spec and decides which components
# are needed, with reasoning per component.
#
# ┌─────────────────┐     ┌────────────────────┐     ┌──────────────────┐
# │  Project Spec   │────→│  claude -p          │────→│  Selected        │
# │  (markdown)     │     │  (reads catalog +   │     │  Components      │
# │                 │     │   spec, returns     │     │  (JSON)          │
# │                 │     │   structured JSON)  │     │                  │
# └─────────────────┘     └────────────────────┘     └──────────────────┘
#                                   │
#                                   ▼
#                         ┌────────────────────┐
#                         │  This YAML file    │
#                         │  (component        │
#                         │   catalog)         │
#                         └────────────────────┘
#
# Human-editable: add components, adjust descriptions,
# or add notes that guide Claude's decision-making.

components:
  cloud_run:
    description: "Serverless container deployment on Cloud Run"
    use_when: >
      The project is a web application, API service, backend, or any
      workload that serves HTTP traffic and needs to be deployed as
      a container.
    not_needed_when: >
      The project is purely a database setup, IAM configuration,
      or batch job with no HTTP serving component.

  iam:
    description: "IAM roles, service accounts, and policy bindings"
    use_when: >
      The project needs service accounts, role bindings, access control
      between GCP services, or any form of identity/permission management.
      Always needed when AlloyDB is selected (service account connectivity).
    not_needed_when: >
      The project uses only default compute credentials and has no
      inter-service authentication requirements.

  alloydb:
    description: "AlloyDB for PostgreSQL — managed relational database"
    use_when: >
      The project requires persistent relational data storage, user data,
      SQL queries, transactions, or mentions PostgreSQL/database needs.
    not_needed_when: >
      The project is a static site, uses only in-memory state, or
      explicitly uses a different database (Firestore, BigQuery, etc.).

# Supporting infrastructure — Claude should mention these when relevant
supporting:
  artifact_registry:
    description: "Container image storage for Cloud Run"
    needed_with: "cloud_run"

  vpc_network:
    description: "VPC networking for AlloyDB private connectivity"
    needed_with: "alloydb"

  service_account:
    description: "Dedicated service account for least-privilege access"
    needed_with: "any component"

  secret_manager:
    description: "Secret Manager for database credentials"
    needed_with: "alloydb"

# Template selection matrix
template_matrix:
  cloud_run: "cloud-run.md"
  iam: "iam.md"
  alloydb: "alloydb.md"
  cloud_run+iam: "cloud-run-iam.md"
  alloydb+cloud_run: "cloud-run-alloydb.md"
  alloydb+cloud_run+iam: "cloud-run-iam-alloydb.md"
